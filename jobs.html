<!-- jobs.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Blood Gaming Studio - Jobs</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="logo">New Blood Gaming</div>
            <nav class="nav-menu">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="merchandise.html">Merchandise</a></li>
                    <li><a href="games.html">Games</a></li>
                    <li><a href="jobs.html">Jobs</a></li>
                    <li><a href="login.html">Login</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="main-content">
        <section class="crud-section">
            <h2>Open Positions</h2>
            <button class="btn-primary" onclick="showAddModal()">Add New Job</button>
            <input type="text" id="job-search" placeholder="Search jobs...">
            <table id="jobs-table" class="table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Title</th>
                        <th>Description</th>
                        <th>Salary</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Populated by JS -->
                </tbody>
            </table>
        </section>

        <!-- Add/Edit Modal -->
        <div class="modal fade" id="job-modal" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="modal-title">Add Job</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <form id="job-form">
                            <input type="hidden" id="job-id">
                            <div class="mb-3">
                                <label>Title</label>
                                <input type="text" id="job-title" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label>Description</label>
                                <textarea id="job-desc" class="form-control" required></textarea>
                            </div>
                            <div class="mb-3">
                                <label>Salary</label>
                                <input type="number" id="job-salary" class="form-control" required>
                            </div>
                        </form>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                        <button type="button" class="btn-primary" onclick="saveJob()">Save</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="contact-info">
                    <h3>Contact Us</h3>
                    <p>Email: info@newbloodgaming.com</p>
                    <p>Phone: +1-555-GAME-DEV</p>
                </div>
                <div class="social-links">
                    <a href="#">Twitter</a> | <a href="#">Facebook</a> | <a href="#">Instagram</a>
                </div>
                <div class="copyright">
                    &copy; 2025 New Blood Gaming Studio. All rights reserved.
                </div>
            </div>
        </div>
    </footer>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
