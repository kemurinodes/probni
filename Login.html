<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Blood Gaming Studio - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="logo">New Blood Gaming</div>
            <nav class="nav-menu">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="merchandise.html">Merchandise</a></li>
                    <li><a href="games.html">Games</a></li>
                    <li><a href="jobs.html">Jobs</a></li>
                    <li><a href="login.html">Login</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="main-content">
        <section class="login-section">
            <h2>Login</h2>
            <form id="login-form" class="login-form">
                <div class="mb-3">
                    <label for="username">Username/Email</label>
                    <input type="text" id="username" class="form-control" required>
                    <span class="error-msg" id="username-error"></span>
                </div>
                <div class="mb-3">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" required>
                    <div class="password-strength" id="strength-indicator"></div>
                    <span class="error-msg" id="password-error"></span>
                </div>
                <div class="mb-3">
                    <label for="confirm-password">Confirm Password</label>
                    <input type="password" id="confirm-password" class="form-control" required>
                    <span class="error-msg" id="confirm-error"></span>
                </div>
                <button type="submit" class="btn-primary">Login</button>
            </form>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="contact-info">
                    <h3>Contact Us</h3>
                    <p>Email: info@newbloodgaming.com</p>
                    <p>Phone: +1-555-GAME-DEV</p>
                </div>
                <div class="social-links">
                    <a href="#">Twitter</a> | <a href="#">Facebook</a> | <a href="#">Instagram</a>
                </div>
                <div class="copyright">
                    &copy; 2025 New Blood Gaming Studio. All rights reserved.
                </div>
            </div>
        </div>
    </footer>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
